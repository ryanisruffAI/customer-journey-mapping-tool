<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Builder</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Startup Builder</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/problems">🧠 Problems</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/validation">✅ Validation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard">🗺️ Journeys</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <h1>My Journeys</h1>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#newJourneyModal">
                    <i class="bi bi-plus-circle"></i> New Journey
                </button>
            </div>
        </div>

        <div class="row" id="journeyList">
            <!-- Journey cards will be inserted here by JavaScript -->
            <div class="col-12 text-center py-5" id="loadingIndicator">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            <div class="col-12 text-center py-5 d-none" id="noJourneysMessage">
                <p class="text-muted">You don't have any journeys yet. Create one to get started!</p>
            </div>
        </div>
    </div>

    <!-- New Journey Modal -->
    <div class="modal fade" id="newJourneyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Journey</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="newJourneyForm">
                        <div class="mb-3">
                            <label for="journeyName" class="form-label">Journey Name</label>
                            <input type="text" class="form-control" id="journeyName" required>
                        </div>
                        <div class="mb-3">
                            <label for="journeyDescription" class="form-label">Description (Optional)</label>
                            <textarea class="form-control" id="journeyDescription" rows="3"></textarea>
                        </div>
                        <div class="alert alert-danger d-none" id="journeyError"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="createJourneyBtn">Create Journey</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Journey Card Template (hidden, will be cloned by JavaScript) -->
    <template id="journeyCardTemplate">
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title journey-name">Journey Name</h5>
                    <p class="card-text text-muted journey-date">Created on: Date</p>
                    <div class="d-flex justify-content-between">
                        <a href="#" class="btn btn-primary edit-journey-btn">Open</a>
                        <button class="btn btn-outline-danger delete-journey-btn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/dashboard.js"></script>
</body>
</html>
